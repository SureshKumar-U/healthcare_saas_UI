name: "react app deployment workflow"
on:
  push:
    branches:
      - main

jobs:
  checkout:
    runs-on: ubuntu-latest
    steps:
      - name: "Set up node environment"
        uses: actions/setup-node@v3
        with:
          node-version: "18"
      - name: "check version of node"
        run: node -v
      